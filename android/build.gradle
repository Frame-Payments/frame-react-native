apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace "com.framepayments.reactnativeframe"
  compileSdk safeExtGet('compileSdkVersion', 36)
  defaultConfig {
    minSdk safeExtGet('minSdkVersion', 26)
    targetSdk safeExtGet('targetSdkVersion', 36)
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions {
    jvmTarget = '17'
  }
  buildFeatures {
    compose true
  }
  composeOptions {
    kotlinCompilerExtensionVersion = "1.5.14"
  }
}

dependencies {
  implementation 'com.facebook.react:react-native:+'
  implementation "org.jetbrains.kotlin:kotlin-stdlib:2.1.0"
  implementation 'com.framepayments:framesdk:2.0.4'
  implementation 'com.framepayments:framesdk_ui:2.0.4'
  implementation 'com.framepayments:framesdk_onboarding:2.0.4'
  // Required by FrameGooglePayButton (PaymentsClient, WalletConstants).
  // framesdk_ui declares this as `implementation`, so it is not exposed transitively.
  implementation 'com.google.android.gms:play-services-wallet:19.4.0'
  // AppCompat is needed because FrameGooglePayButton casts its host to AppCompatActivity.
  implementation 'androidx.appcompat:appcompat:1.7.0'
  implementation 'com.google.code.gson:gson:2.10.1'
  implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
  // Frame SDK UI uses Compose; LocalLifecycleOwner requires lifecycle-runtime-compose 2.8+
  implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.8.2'
  // Compose support for FrameOnboardingActivity
  implementation 'androidx.activity:activity-compose:1.12.2'
}
